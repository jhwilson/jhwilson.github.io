- title: Personal Statement
  type: list
  contents:
    - Throughout my career, I have been propelled by the pursuit of fundamental questions at the intersection of condensed matter physics, quantum information, and analog gravity. In this quest, I have discovered novel physical phenomena and forged new theoretical frameworks, exploring how disorder, incommensuration, and measurement-induced effects shape quantum materials and dynamics. These themes, which I have found to be unifying principles that span solid-state systems, cold atomic gases, and emergent spacetimes, continue to inspire my research.
